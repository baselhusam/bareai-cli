name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o bareai${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/bareai

  smoke:
    name: Smoke commands
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        shell: bash
        run: |
          go build -o bareai${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/bareai

      - name: Smoke
        shell: bash
        run: |
          set -euo pipefail
          BIN=./bareai
          if [ "${{ matrix.os }}" = "windows-latest" ]; then BIN=./bareai.exe; fi
          export NO_COLOR=1
          "$BIN" status --json >/dev/null
          "$BIN" gpu --json >/dev/null
          "$BIN" docker --json >/dev/null
          "$BIN" llm --json >/dev/null
          "$BIN" inspect --json >/dev/null
          "$BIN" probe --endpoint http://127.0.0.1:59999 --runtime ollama --json >/dev/null
          "$BIN" version --json >/dev/null
          "$BIN" watch >/dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  goreleaser:
    name: GoReleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.8.1

      - name: Check config
        run: goreleaser check
